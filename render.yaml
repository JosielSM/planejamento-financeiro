services:
  - type: web
    name: planejamento-financeiro
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: planejamento-financeiro-db
          property: connectionString

databases:
  - name: planejamento-financeiro-db
    plan: free
