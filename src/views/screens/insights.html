<aside class="insights-panel tab-screen" data-tab-panel="destino" aria-label="Resumo por categoria">
          <div class="panel-heading">
            <div>
              <p class="eyebrow destination-eyebrow">Análise das despesas</p>
              <h2 class="heading-with-icon"><i data-lucide="chart-pie" aria-hidden="true"></i> Para onde vai seu dinheiro</h2>
              <p class="section-note">Veja como as despesas do mês estão distribuídas entre suas categorias.</p>
            </div>
          </div>
          <section class="destination-overview" aria-label="Visão geral das despesas por categoria">
            <div class="destination-pie-area">
              <div class="destination-pie" id="destinationPieChart" role="img" aria-label="Gráfico de despesas por categoria">
                <div><span>Total gasto</span><strong id="destinationPieTotal">R$ 0,00</strong></div>
              </div>
              <div class="destination-legend" id="destinationLegend"></div>
            </div>
            <div class="destination-summary">
              <article><i data-lucide="circle-dollar-sign" aria-hidden="true"></i><span>Despesas do mês</span><strong id="destinationTotalExpense">R$ 0,00</strong></article>
              <article><i data-lucide="badge-alert" aria-hidden="true"></i><span>Maior categoria</span><strong id="destinationTopCategory">Sem dados</strong><small id="destinationTopValue">R$ 0,00</small></article>
              <article><i data-lucide="tags" aria-hidden="true"></i><span>Categorias utilizadas</span><strong id="destinationCategoryCount">0</strong></article>
            </div>
          </section>
          <section class="category-details" aria-labelledby="categoryDetailsTitle">
            <div class="category-details-heading">
              <h3 id="categoryDetailsTitle">Detalhamento por categoria</h3>
              <p>Valores, participação no total e comparação visual.</p>
            </div>
            <div id="categoryBreakdown" class="category-breakdown"></div>
          </section>
        </aside>
      </section>
