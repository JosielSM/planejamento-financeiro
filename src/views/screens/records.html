<section class="records-band tab-screen" data-tab-panel="registros">
        <div class="records-header">
          <h2 class="heading-with-icon"><i data-lucide="clipboard-list" aria-hidden="true"></i> Registros</h2>
          <div class="filters">
            <select id="typeFilter" aria-label="Filtrar por tipo">
              <option value="all">Tudo</option>
              <option value="income">Ganhos</option>
              <option value="expense">Despesas</option>
            </select>
            <select id="frequencyFilter" aria-label="Filtrar por frequencia">
              <option value="all">Todas frequencias</option>
              <option value="daily">Diários</option>
              <option value="monthly">Mensais fixas</option>
              <option value="occasional">Eventuais</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Descricao</th>
                <th>Categoria</th>
                <th>Frequencia</th>
                <th>Valor</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
        <p id="emptyState" class="empty-state">Nenhum registro para este mes.</p>
      </section>
